---
layout: default
---
<div class="container">
  <div class="post-page">
    <div class="post-page-header">
      <div class="post-meta">
        <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
        {% if page.tag %}<span class="post-tag">{{ page.tag }}</span>{% endif %}
      </div>
      <h1>{{ page.title }}</h1>
    </div>
    <div class="post-content">
      {{ content }}
    </div>
    <p style="margin-top:2.5rem">
      <a href="{{ site.baseurl }}/blog">&larr; Back to Blog</a>
    </p>
  </div>
</div>
